# Ultrasound-adapted preprocessing config for DINO-Tracker
# Adapted from preprocessing.yaml for grayscale liver ultrasound videos

# --- OF trajectories config ---
# Ultrasound frames are roughly 4:3 aspect ratio and lower resolution
# Reduced resolution for faster demo (divisible by 14 for DINO patches)
video_resh: 280
video_resw: 378
min_trajectory_length: 2
threshold: 1.5
filter_using_direct_flow: true
direct_flow_threshold: 2.5

# --- DINO embeddings for training & dino-bb ---
# Using ViT-Small for T4 GPU compatibility (ViT-Large OOMs on T4)
dino_model_name: dinov2_vits14
dino_facet: tokens
dino_layer: 11
dino_stride: 7

# --- DINO embeddings for FG mask ---
# Use smaller ViT-Small model for mask generation (faster, less VRAM)
mask_dino_model_name: dinov2_vits14
mask_dino_facet: tokens
mask_dino_layer: 11
mask_dino_stride: 7

# --- FG mask ---
# Ultrasound saliency patterns differ from natural images;
# lower threshold to capture more of the liver region
fg_mask_threshold: 0.5

# --- DINO Best-Buddies ---
dino_bb_box_size: 30
dino_bb_iou_threshold: 0.2

# --- ROI cropping ---
# Crop out dead black space, UI legends, and depth markers around the
# ultrasound fan sector. Highly recommended — DINOv2 patches and RAFT
# optical flow waste capacity on non-content regions.
crop_ultrasound_roi: true
roi_pad_pixels: 5          # safety margin around detected ROI
roi_threshold: 10          # pixel intensity threshold (0-255) for content detection
